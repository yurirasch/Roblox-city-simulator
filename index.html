<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox City Simulator 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      z-index: 10;
      pointer-events: none;
    }
    #ui h1 {
      font-size: 1.3rem;
      font-weight: 700;
      text-shadow: 0 2px 6px rgba(0,0,0,.8);
      margin-bottom: 6px;
    }
    #controls-panel {
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .78rem;
      line-height: 1.7;
      color: #ddd;
    }
    #controls-panel kbd {
      background: rgba(255,255,255,.15);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: .76rem;
      color: #fff;
    }

    #btn-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: .82rem;
      transition: background .2s;
    }
    .btn:hover { background: rgba(255,255,255,.15); }

    #stats {
      position: fixed;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 6px 12px;
      color: #adf;
      font-size: .75rem;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="ui">
  <h1>🏙️ Roblox City Simulator</h1>
  <div id="controls-panel">
    <strong>Controls</strong><br/>
    🖱️ Left drag — rotate camera<br/>
    🖱️ Right drag — pan<br/>
    🖱️ Scroll — zoom in / out<br/>
    📱 Pinch — zoom (touch)<br/>
  </div>
</div>

<div id="btn-panel">
  <button class="btn" id="btn-day">☀️ Day / 🌙 Night</button>
  <button class="btn" id="btn-cars">🚗 Toggle Cars</button>
  <button class="btn" id="btn-rebuild">🔄 New City</button>
</div>

<div id="stats">Buildings: — | Cars: —</div>

<!-- Three.js r158 (bundled in lib/) -->
<script type="importmap">
{
  "imports": {
    "three": "./lib/three/build/three.module.js",
    "three/addons/": "./lib/three/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.5, 2000);
camera.position.set(0, 90, 140);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 20;
controls.maxDistance = 500;
controls.maxPolarAngle = Math.PI / 2.1;

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Lighting ─────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.6);
sunLight.position.set(80, 160, 60);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 600;
sunLight.shadow.camera.left = -200;
sunLight.shadow.camera.right = 200;
sunLight.shadow.camera.top = 200;
sunLight.shadow.camera.bottom = -200;
scene.add(sunLight);

const hemi = new THREE.HemisphereLight(0x7ec8e3, 0x3a7d44, 0.4);
scene.add(hemi);

// ─── Sky colours ──────────────────────────────────────────────────────────────
let isDay = true;
const DAY_SKY   = new THREE.Color(0x87ceeb);
const NIGHT_SKY = new THREE.Color(0x0a0a1a);
scene.background = DAY_SKY.clone();
scene.fog = new THREE.Fog(DAY_SKY, 250, 600);

function applyDayNight() {
  if (isDay) {
    scene.background = DAY_SKY.clone();
    scene.fog = new THREE.Fog(DAY_SKY, 250, 600);
    ambientLight.intensity = 0.6;
    sunLight.intensity     = 1.6;
    hemi.intensity         = 0.4;
    // turn off window lights
    windowLights.forEach(m => { m.emissiveIntensity = 0; });
  } else {
    scene.background = NIGHT_SKY.clone();
    scene.fog = new THREE.Fog(NIGHT_SKY, 200, 500);
    ambientLight.intensity = 0.08;
    sunLight.intensity     = 0.05;
    hemi.intensity         = 0.05;
    // turn on window lights
    windowLights.forEach(m => { m.emissiveIntensity = 1.0; });
  }
}

// ─── Materials ────────────────────────────────────────────────────────────────
const matRoad = new THREE.MeshLambertMaterial({ color: 0x333340 });
const matSide = new THREE.MeshLambertMaterial({ color: 0x9e9e9e });
const matGrass= new THREE.MeshLambertMaterial({ color: 0x4caf50 });
const matPark = new THREE.MeshLambertMaterial({ color: 0x388e3c });
const matTree = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
const matTrunk= new THREE.MeshLambertMaterial({ color: 0x5d4037 });
const matLine = new THREE.MeshLambertMaterial({ color: 0xfafafa });

// Building palette (Roblox-ish bright colours)
const BLDG_COLORS = [
  0xe53935, 0x8e24aa, 0x1565c0, 0x00838f,
  0x2e7d32, 0xf57f17, 0x4e342e, 0x546e7a,
  0xc62828, 0x283593, 0xbf360c, 0x37474f,
];

function bldgMat(h) {
  const col = BLDG_COLORS[Math.floor(Math.random() * BLDG_COLORS.length)];
  return new THREE.MeshLambertMaterial({ color: col });
}

const windowLights = []; // emissive window materials (toggled night/day)

// ─── City grid config ─────────────────────────────────────────────────────────
const GRID     = 12;      // city cells per side
const CELL     = 20;      // metres per cell (incl road)
const ROAD_W   = 4;       // road width
const BLOCK_W  = CELL - ROAD_W; // block usable width
const HALF     = (GRID * CELL) / 2;

const cityGroup = new THREE.Group();
scene.add(cityGroup);

const carGroup  = new THREE.Group();
scene.add(carGroup);

let buildingCount = 0;
let carObjects = [];

// ─── Build city ───────────────────────────────────────────────────────────────
function buildCity() {
  // remove old
  while (cityGroup.children.length) cityGroup.remove(cityGroup.children[0]);
  while (carGroup.children.length)  carGroup.remove(carGroup.children[0]);
  carObjects = [];
  windowLights.length = 0;
  buildingCount = 0;

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(GRID * CELL + 20, GRID * CELL + 20);
  const ground = new THREE.Mesh(groundGeo, matGrass);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  cityGroup.add(ground);

  for (let gx = 0; gx < GRID; gx++) {
    for (let gz = 0; gz < GRID; gz++) {
      const cx = gx * CELL - HALF + CELL / 2;
      const cz = gz * CELL - HALF + CELL / 2;

      // Road tile (X)
      addBox(CELL, 0.25, ROAD_W, cx, 0.125, cz - BLOCK_W / 2, matRoad);
      addBox(CELL, 0.25, ROAD_W, cx, 0.125, cz + BLOCK_W / 2, matRoad);
      // Road tile (Z)
      addBox(ROAD_W, 0.25, CELL, cx - BLOCK_W / 2, 0.125, cz, matRoad);
      addBox(ROAD_W, 0.25, CELL, cx + BLOCK_W / 2, 0.125, cz, matRoad);
      // Sidewalk
      addBox(BLOCK_W, 0.3, BLOCK_W, cx, 0.15, cz, matSide);

      const rand = Math.random();
      if (rand < 0.07) {
        // Park block
        addBox(BLOCK_W - 1, 0.35, BLOCK_W - 1, cx, 0.175, cz, matPark);
        spawnTrees(cx, cz, 4 + Math.floor(Math.random() * 5));
      } else {
        // Buildings
        const rows = 1 + Math.floor(Math.random() * 2);
        const cols = 1 + Math.floor(Math.random() * 2);
        for (let bi = 0; bi < rows; bi++) {
          for (let bj = 0; bj < cols; bj++) {
            const bw = (BLOCK_W - 1) / cols - 0.4;
            const bd = (BLOCK_W - 1) / rows - 0.4;
            const bh = 4 + Math.random() * (gx === Math.floor(GRID/2) && gz === Math.floor(GRID/2) ? 60 : 35);
            const bx = cx - (BLOCK_W - 1) / 2 + bw / 2 + bj * ((BLOCK_W - 1) / cols);
            const bz = cz - (BLOCK_W - 1) / 2 + bd / 2 + bi * ((BLOCK_W - 1) / rows);
            spawnBuilding(bx, bz, bw, bh, bd);
          }
        }
      }
    }
  }

  // Road centre lines
  for (let i = 0; i <= GRID; i++) {
    const pos = i * CELL - HALF;
    // horizontal
    addBox(GRID * CELL, 0.28, 0.25, 0, 0.14, pos, matLine);
    // vertical
    addBox(0.25, 0.28, GRID * CELL, pos, 0.14, 0, matLine);
  }

  updateStats();
}

function addBox(w, h, d, x, y, z, mat) {
  const geo  = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.receiveShadow = true;
  cityGroup.add(mesh);
  return mesh;
}

function spawnBuilding(x, z, w, h, d) {
  const mat  = bldgMat(h);
  const geo  = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow   = true;
  mesh.receiveShadow= true;
  cityGroup.add(mesh);
  buildingCount++;

  // Window emissive overlay strips
  const winMat = new THREE.MeshLambertMaterial({
    color: 0xfff9c4,
    emissive: 0xfff176,
    emissiveIntensity: 0,
    transparent: true,
    opacity: 0.85,
  });
  windowLights.push(winMat);

  const floors = Math.max(1, Math.floor(h / 3.5));
  for (let f = 0; f < floors; f++) {
    const wy = h / 2 - h + 1.5 + f * 3.5;
    // front / back
    [-1, 1].forEach(side => {
      const wg = new THREE.PlaneGeometry(w * 0.6, 1.2);
      const wm = new THREE.Mesh(wg, winMat);
      wm.position.set(x, wy, z + side * (d / 2 + 0.02));
      if (side === -1) wm.rotation.y = Math.PI;
      cityGroup.add(wm);
    });
  }
}

function spawnTrees(cx, cz, count) {
  for (let i = 0; i < count; i++) {
    const tx = cx + (Math.random() - 0.5) * (BLOCK_W - 3);
    const tz = cz + (Math.random() - 0.5) * (BLOCK_W - 3);
    const h  = 3 + Math.random() * 5;
    // trunk
    const tg = new THREE.CylinderGeometry(0.25, 0.3, h * 0.4, 6);
    const tm = new THREE.Mesh(tg, matTrunk);
    tm.position.set(tx, h * 0.2, tz);
    tm.castShadow = true;
    cityGroup.add(tm);
    // canopy
    const cg = new THREE.SphereGeometry(h * 0.38, 7, 6);
    const cm = new THREE.Mesh(cg, matTree);
    cm.position.set(tx, h * 0.55, tz);
    cm.castShadow = true;
    cityGroup.add(cm);
  }
}

// ─── Cars ─────────────────────────────────────────────────────────────────────
const CAR_COLORS = [0xff1744, 0x2979ff, 0xffea00, 0x00e676, 0xff6d00, 0xffffff, 0xaa00ff];

function spawnCars(n = 40) {
  while (carGroup.children.length) carGroup.remove(carGroup.children[0]);
  carObjects = [];

  for (let i = 0; i < n; i++) {
    const isX  = Math.random() < 0.5;           // drive along X or Z axis
    const lane = (Math.floor(Math.random() * GRID) + 0.5) * CELL - HALF;
    const dir  = Math.random() < 0.5 ? 1 : -1;
    const offset = (ROAD_W / 4) * (dir > 0 ? 1 : -1);

    const carCol = CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)];
    const body   = new THREE.Mesh(
      new THREE.BoxGeometry(3, 1, 1.6),
      new THREE.MeshLambertMaterial({ color: carCol })
    );
    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(1.6, 0.8, 1.4),
      new THREE.MeshLambertMaterial({ color: carCol })
    );
    roof.position.set(-0.2, 0.9, 0);

    const car = new THREE.Group();
    car.add(body);
    car.add(roof);

    const startT = Math.random() * GRID * CELL;
    if (isX) {
      car.position.set(startT - HALF, 0.7, lane + offset);
      car.rotation.y = dir > 0 ? 0 : Math.PI;
    } else {
      car.position.set(lane + offset, 0.7, startT - HALF);
      car.rotation.y = dir > 0 ? Math.PI / 2 : -Math.PI / 2;
    }

    carGroup.add(car);
    carObjects.push({ mesh: car, isX, dir, lane, offset, speed: 8 + Math.random() * 10 });
  }
}

function updateCars(dt) {
  const range = GRID * CELL;
  for (const c of carObjects) {
    if (c.isX) {
      c.mesh.position.x += c.dir * c.speed * dt;
      if (c.mesh.position.x >  HALF + 5) c.mesh.position.x = -HALF - 5;
      if (c.mesh.position.x < -HALF - 5) c.mesh.position.x =  HALF + 5;
    } else {
      c.mesh.position.z += c.dir * c.speed * dt;
      if (c.mesh.position.z >  HALF + 5) c.mesh.position.z = -HALF - 5;
      if (c.mesh.position.z < -HALF - 5) c.mesh.position.z =  HALF + 5;
    }
  }
}

// ─── Stars (night) ────────────────────────────────────────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 1500; i++) {
  starVerts.push((Math.random() - 0.5) * 1800);
  starVerts.push(100 + Math.random() * 400);
  starVerts.push((Math.random() - 0.5) * 1800);
}
starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 }));
stars.visible = false;
scene.add(stars);

// ─── UI buttons ───────────────────────────────────────────────────────────────
document.getElementById('btn-day').addEventListener('click', () => {
  isDay = !isDay;
  stars.visible = !isDay;
  applyDayNight();
});

let carsVisible = true;
document.getElementById('btn-cars').addEventListener('click', () => {
  carsVisible = !carsVisible;
  carGroup.visible = carsVisible;
});

document.getElementById('btn-rebuild').addEventListener('click', () => {
  buildCity();
  spawnCars(40);
  applyDayNight();
});

function updateStats() {
  document.getElementById('stats').textContent =
    `Buildings: ${buildingCount} | Cars: ${carObjects.length}`;
}

// ─── Init + loop ──────────────────────────────────────────────────────────────
buildCity();
spawnCars(40);
updateStats();

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  updateCars(dt);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
